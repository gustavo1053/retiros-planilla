@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Share+Tech+Mono&display=swap');

<script>
// ── CONSTANTES ──────────────────────────────────────────────
const PANELES = ['Age 18','Age 19','Age 21','Age 22','Age 23','Age 24','Age 25','Sm'];
const PC = ['p18','p19','p21','p22','p23','p24','p25','psm'];
const DIAS_NOMBRE = ['LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO','DOMINGO'];
const DIAS_CORTO  = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const PERSONAL = [
  [{n:'Andrea',t:'M'},{n:'Meli',t:'T'},{n:'Tammi',t:'N'}],
  [{n:'Lourdes',t:'M'},{n:'Ingrid',t:'T'},{n:'Nico',t:'N'}],
  [{n:'Nao',t:'M'},{n:'Jhona',t:'T'},{n:'Majo',t:'N'}],
  [{n:'Mili',t:'M'},{n:'Vero',t:'T'},{n:'Jenni',t:'N'}],
  [{n:'Agus M',t:'M'},{n:'Maria',t:'T'},{n:'Anto',t:'N'}],
  [{n:'Agus',t:'M'},{n:'Romi',t:'T'},{n:'Jhoa',t:'N'}],
  [{n:'Cami',t:'M'},{n:'Thiago',t:'T'},{n:'May',t:'N'}],
  [{n:'Rafa',t:'M'},{n:'Brisa',t:'T'},{n:'Mile',t:'N'}],
];

// ── ESTADO ──────────────────────────────────────────────────
let MES = 'Junio 2026';
let DATA = {};

function g(k)   { return (DATA[MES] && DATA[MES][k] != null) ? DATA[MES][k] : ''; }
function s(k,v) { if (!DATA[MES]) DATA[MES]={}; DATA[MES][k]=v; }
function nv(v)  { return parseFloat((String(v)).replace(/\./g,'').replace(',','.')) || 0; }
function fmt(v) { return v ? Math.round(v).toLocaleString('es-AR') : ''; }

// ── NAV ─────────────────────────────────────────────────────
function showSheet(id, el) {
  document.querySelectorAll('.sheet').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.stab').forEach(x => x.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
  const flo = document.getElementById('resFlotante');
  if (!flo) return;
  const semMatch = id.match(/^sh_s[1-4]$/);
  if (semMatch) { flo.classList.add('visible'); actualizarFlotante(id); }
  else { flo.classList.remove('visible'); }
}

function actualizarFlotante(shId) {
  const semNums = {'sh_s1':1,'sh_s2':2,'sh_s3':3,'sh_s4':4};
  const t = document.getElementById('resFloTitulo');
  if (t) t.textContent = `Semana ${semNums[shId]||1} — ${MES}`;
  const PBGS = ['#FFFF00','#FFC000','#FF0000','#00B050','#0070C0','#7030A0','#00B0F0','#e0e0e0'];
  const PTCS = ['#000','#000','#fff','#fff','#fff','#fff','#000','#000'];
  let phtml = '';
  PANELES.forEach((p,pi) => {
    let tot=0;
    for(let d=0;d<7;d++){
      tot+=nv(g(`${shId}_d${d}_p${pi}_m`));
      tot+=nv(g(`${shId}_d${d}_p${pi}_t`));
      tot+=nv(g(`${shId}_d${d}_p${pi}_n`));
    }
    phtml+=`<span class="res-flo-p" style="background:${PBGS[pi]};color:${PTCS[pi]}">${p}${tot?' '+fmt(tot):''}</span>`;
  });
  const pd = document.getElementById('resFloPaneles');
  if (pd) pd.innerHTML = phtml;
  let tM=0,tL=0,tG=0;
  for(let d=0;d<7;d++){
    tM+=nv(g(`${shId}_d${d}_retM`));
    tL+=nv(g(`${shId}_d${d}_retL`));
    tG+=nv(g(`${shId}_d${d}_gasto`));
  }
  const eM=document.getElementById('resFloRetM');
  const eL=document.getElementById('resFloRetL');
  const eG=document.getElementById('resFloGasto');
  if(eM) eM.textContent = tM?'$'+fmt(tM):'—';
  if(eL) eL.textContent = tL?'$'+fmt(tL):'—';
  if(eG) eG.textContent = tG?'$'+fmt(tG):'—';
}

async function cambiarMes() {
  MES = document.getElementById('mesSelect').value;
  // Resetear offsets de semana y sueldos al cambiar mes
  ['sh_s1','sh_s2','sh_s3','sh_s4','sh_su1','sh_su2','sh_su3','sh_su4'].forEach(id => {
    s(id+'_offset', '0');
  });
  await cargarDesdeFirebase();
  renderAll();
}

// ── INPUT HELPER ─────────────────────────────────────────────
function inp(id, extra='', ph='') {
  const val = g(id);
  return `<input class="c ${extra}" id="${id}" value="${val}" placeholder="${ph}"
    oninput="onInp(this)" onchange="onInp(this)">`;
}

function onInp(el) {
  s(el.id, el.value);
  const id = el.id;

  // Semana día: sh_s1_d2_p3_m  → recalc ese día
  const mDia = id.match(/^(sh_s\d)_d(\d+)_(p\d+_[mtn]|retL|retM|pagF|banco|gasto|usd)$/);
  if (mDia) { recalcDia(mDia[1], parseInt(mDia[2])); recalcSemRes(mDia[1]); }

  // Sueldo: sh_su1_... → recalc ese sueldo
  const mSu = id.match(/^(sh_su\d)_/);
  if (mSu) recalcSueldo(mSu[1]);

  // Carga: sh_carga_p2_c0_d3 → recalc esa carga
  const mCg = id.match(/^(sh_carga)_p(\d+)_c(\d+)_d(\d+)$/);
  if (mCg) recalcCarga(parseInt(mCg[3]));

  autoSave();
}

// ── SETCALC ──────────────────────────────────────────────────
function sc(id, val) {
  const el = document.getElementById(id);
  if (el) { el.textContent = fmt(val); el._val = val || 0; }
}

// ── RECALC DÍA ───────────────────────────────────────────────
function recalcDia(sem, d) {
  let totM=0, totT=0, totN=0;
  PANELES.forEach((p,pi) => {
    totM += nv(g(`${sem}_d${d}_p${pi}_m`));
    totT += nv(g(`${sem}_d${d}_p${pi}_t`));
    totN += nv(g(`${sem}_d${d}_p${pi}_n`));
  });
  const banco = nv(g(`${sem}_d${d}_banco`));
  const retL  = nv(g(`${sem}_d${d}_retL`));
  const retM  = nv(g(`${sem}_d${d}_retM`));
  const pagF  = nv(g(`${sem}_d${d}_pagF`));
  const gasto  = nv(g(`${sem}_d${d}_gasto`));
  const usd    = nv(g(`${sem}_d${d}_usd`));
  const sueJaz = nv(g(`${sem}_d${d}_sue_Jaz`));
  const sueEmi = nv(g(`${sem}_d${d}_sue_Emi`));
  const sueGus = nv(g(`${sem}_d${d}_sue_Gustavo`));
  const total  = totM + totT + totN + banco;
  const sub    = total - retL - retM - pagF - gasto - usd - sueJaz - sueEmi - sueGus;
  sc(`${sem}_d${d}_totM`, totM);
  sc(`${sem}_d${d}_totT`, totT);
  sc(`${sem}_d${d}_totN`, totN);
  sc(`${sem}_d${d}_totDia`, totM+totT+totN);
  // Totales por panel
  let totSue=0, totBon=0;
  PANELES.forEach((p,pi) => {
    const pm = nv(g(`${sem}_d${d}_p${pi}_m`));
    const pt = nv(g(`${sem}_d${d}_p${pi}_t`));
    const pn = nv(g(`${sem}_d${d}_p${pi}_n`));
    sc(`${sem}_d${d}_p${pi}_tot`, pm+pt+pn);
    totSue += nv(g(`${sem}_d${d}_p${pi}_sue`));
    totBon += nv(g(`${sem}_d${d}_p${pi}_bon`));
  });
  sc(`${sem}_d${d}_totSue`, totSue);
  sc(`${sem}_d${d}_totBon`, totBon);
  sc(`${sem}_d${d}_total`, total);
  sc(`${sem}_d${d}_sub`,   sub);
  // Actualizar cards diseño A
  const tcEl = document.getElementById(`${sem}_d${d}_total_card`);
  const scEl = document.getElementById(`${sem}_d${d}_sub_card`);
  const rLEl = document.getElementById(`${sem}_d${d}_retL_card`);
  const rMEl = document.getElementById(`${sem}_d${d}_retM_card`);
  if(tcEl) tcEl.textContent = total ? '$'+fmt(total) : '—';
  if(scEl) scEl.textContent = sub   ? '$'+fmt(sub)   : '—';
  if(rLEl) rLEl.textContent = retL  ? '$'+fmt(retL)  : '—';
  if(rMEl) rMEl.textContent = retM  ? '$'+fmt(retM)  : '—';

  // Propagar Sub Total al banco del día siguiente
  if (sub > 0 && d < 6) {
    const nextKey = `${sem}_d${d+1}_banco`;
    const autoKey = `${sem}_d${d+1}_banco_auto`;
    // Solo si no fue editado manualmente
    if (!g(autoKey) || g(autoKey) === '1') {
      s(nextKey, Math.round(sub).toString());
      s(autoKey, '1');
      const el = document.getElementById(nextKey);
      if (el) { el.value = Math.round(sub).toLocaleString('es-AR'); el.style.background='#e8f0fe'; }
      recalcDia(sem, d+1);
      recalcSemRes(sem);
    }
  }
}

function recalcSemRes(sem) {
  // Actualizar flotante si está visible
  const flo = document.getElementById('resFlotante');
  if (flo && flo.classList.contains('visible')) actualizarFlotante(sem);
  PANELES.forEach((p,pi) => {
    let tot=0;
    for (let d=0; d<7; d++) {
      tot += nv(g(`${sem}_d${d}_p${pi}_m`));
      tot += nv(g(`${sem}_d${d}_p${pi}_t`));
      tot += nv(g(`${sem}_d${d}_p${pi}_n`));
    }
    sc(`${sem}_res_p${pi}`, tot);
  });
  let tL=0, tM=0, tG=0;
  for (let d=0; d<7; d++) {
    tL += nv(g(`${sem}_d${d}_retL`));
    tM += nv(g(`${sem}_d${d}_retM`));
    tG += nv(g(`${sem}_d${d}_gasto`));
  }
  sc(`${sem}_totRetL`, tL);
  sc(`${sem}_totRetM`, tM);
  sc(`${sem}_totGasto`, tG);
}

// ── RECALC SUELDO ────────────────────────────────────────────
function recalcSueldo(su) {
  for (let d=0; d<7; d++) {
    let col=0;
    PANELES.forEach((p,pi) => {
      PERSONAL[pi].forEach((per,peri) => {
        col += nv(g(`${su}_p${pi}_r${peri}_d${d}`));
      });
    });
    sc(`${su}_col${d}`, col);
  }
  let grand=0;
  for (let d=0; d<7; d++) {
    const el = document.getElementById(`${su}_col${d}`);
    grand += el ? (el._val||0) : 0;
  }
  sc(`${su}_subtot`, grand);
  // totales por persona
  PANELES.forEach((p,pi) => {
    PERSONAL[pi].forEach((per,peri) => {
      let tot=0;
      for (let d=0; d<7; d++) tot += nv(g(`${su}_p${pi}_r${peri}_d${d}`));
      tot += nv(g(`${su}_p${pi}_r${peri}_prop`));
      sc(`${su}_p${pi}_r${peri}_tot`, tot);
    });
  });
}

// ── RECALC CARGA ─────────────────────────────────────────────
function recalcCarga(ci) {
  PANELES.forEach((p,pi) => {
    let row=0;
    for (let d=0; d<7; d++) row += nv(g(`sh_carga_p${pi}_c${ci}_d${d}`));
    sc(`cg_p${pi}_c${ci}_tot`, row*0.7);
  });
  for (let d=0; d<7; d++) {
    let col=0;
    PANELES.forEach((p,pi) => col += nv(g(`sh_carga_p${pi}_c${ci}_d${d}`)));
    sc(`cg_c${ci}_d${d}_tot`, col);
  }
  let grand=0;
  PANELES.forEach((p,pi) => {
    let row=0;
    for (let d=0; d<7; d++) row += nv(g(`sh_carga_p${pi}_c${ci}_d${d}`));
    grand += row;
  });
  sc(`cg_c${ci}_grand`, grand*0.7);
}

// ── HELPERS FECHA ────────────────────────────────────────────
// Devuelve el lunes de la semana N del mes (0-indexed)
function luneSemana(mesStr, semIdx) {
  const [mesNom, anio] = mesStr.split(' ');
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                 'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const m = meses.indexOf(mesNom);
  const y = parseInt(anio);
  // Siempre empezar desde el día 1 del mes + semIdx*7
  const d = new Date(y, m, 1 + semIdx*7);
  return d;
}

function periodoLabel(lunes) {
  const dom = new Date(lunes); dom.setDate(lunes.getDate()+6);
  const pad = n => String(n).padStart(2,'0');
  return `${pad(lunes.getDate())}/${pad(lunes.getMonth()+1)} al ${pad(dom.getDate())}/${pad(dom.getMonth()+1)}/${dom.getFullYear()}`;
}

function fechaDia(lunes, d) {
  const dt = new Date(lunes); dt.setDate(lunes.getDate()+d);
  const pad = n => String(n).padStart(2,'0');
  return `${pad(dt.getDate())}/${pad(dt.getMonth()+1)}`;
}

// semIdx: 0-3 para s1-s4
const SEM_IDX = {'sh_s1':0,'sh_s2':1,'sh_s3':2,'sh_s4':3};

function getSemOffset(shId) {
  const key = shId+'_offset';
  return parseInt(g(key)) || 0;
}

function moveSuSem(shId, delta) {
  const key = shId+'_offset';
  const cur = parseInt(g(key)) || 0;
  s(key, cur+delta);
  // Re-render solo la hoja de sueldos activa
  const suMap = {'sh_su1':0,'sh_su2':1,'sh_su3':2,'sh_su4':3};
  const idx = suMap[shId];
  if (idx !== undefined) renderSueldo(shId, `Sueldos Semana ${idx+1} — ${MES}`);
}

function moveSem(shId, delta) {
  const key = shId+'_offset';
  const cur = getSemOffset(shId);
  s(key, cur+delta);
  renderSemana(shId, ''); // re-render
  // Actualizar titulo
  const idx = SEM_IDX[shId] !== undefined ? SEM_IDX[shId] : 0;
  const lunes = getLunesSem(shId);
  const el = document.getElementById(shId+'_periodo_lbl');
  if(el) el.textContent = periodoLabel(lunes);
}

function getLunesSem(shId) {
  const base = SEM_IDX[shId] !== undefined ? SEM_IDX[shId] : 0;
  const offset = getSemOffset(shId);
  const lunes = luneSemana(MES, base + offset);
  return lunes;
}

function moveDay(shId, dIdx, delta) {
  const key = `${shId}_d${dIdx}_offset`;
  const cur = parseInt(g(key)) || 0;
  s(key, cur+delta);
  // Actualizar label del día
  const lunes = getLunesSem(shId);
  const dt = new Date(lunes); dt.setDate(lunes.getDate()+dIdx + (cur+delta));
  const pad = n => String(n).padStart(2,'0');
  const fechaStr = `${pad(dt.getDate())}/${pad(dt.getMonth()+1)}`;
  const lblEl = document.getElementById(`${shId}_d${dIdx}_flbl`);
  if(lblEl) lblEl.textContent = fechaStr;
  autoSave();
}

function fbDoc(mes) {
  return window._doc(window._db, 'retiros_data', mes.replace(/ /g,'_'));
}

// ── MAPEO PANELES → AGENTES TURNOSDATA ───────────────────────
const PANEL_TO_AG = {
  'Age 18': 'AG 18',
  'Age 19': 'AG 19',
  'Age 21': 'AG 21',
  'Age 22': 'AG 22',
  'Age 23': 'AG 23',
  'Age 24': 'AG 24',
  'Age 25': 'AG 25',
  'Sm':     'SIEMPRE MONO',
};

// Caché de turnosData
let TURNOS_CACHE = {};

async function cargarTurnosData() {
  if (!window._fbReady || !window._db) return;
  try {
    // Traer los docs de retiros_sueldos directamente por fecha
    // Calcular rango de fechas del mes actual
    const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                   'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const [mesNom, anio] = MES.split(' ');
    const m = meses.indexOf(mesNom);
    const y = parseInt(anio);
    const fechas = [];
    const diasEnMes = new Date(y, m+1, 0).getDate();
    for (let d=1; d<=diasEnMes; d++) {
      const f = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      fechas.push(f);
    }
    // También incluir últimos días del mes anterior (para semana 1)
    for (let d=1; d<=7; d++) {
      const dt = new Date(y, m, d-7);
      const f = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
      fechas.push(f);
    }

    // Leer cada fecha de Firebase
    await Promise.all(fechas.map(async fecha => {
      try {
        const snap = await window._getDoc(window._doc(window._db, 'retiros_sueldos', fecha));
        if (snap.exists()) {
          const data = snap.data();
          if (data.agentes) {
            Object.entries(data.agentes).forEach(([agKey, turnos]) => {
              if (!TURNOS_CACHE[agKey]) TURNOS_CACHE[agKey] = {};
              TURNOS_CACHE[agKey][fecha] = turnos;
            });
          }
        }
      } catch(e) {}
    }));
    console.log('retiros_sueldos cargado. Agentes:', Object.keys(TURNOS_CACHE));
  } catch(e) {
    console.warn('Error cargando retiros_sueldos:', e);
  }
}

function getSueldo(panel, fecha) {
  // fecha formato YYYY-MM-DD
  const agKey = PANEL_TO_AG[panel];
  if (!agKey || !TURNOS_CACHE[agKey]) return 0;
  const diaData = TURNOS_CACHE[agKey][fecha];
  if (!diaData) return 0;
  // Sumar sueldo de los 3 turnos
  let total = 0;
  ['manana','tarde','noche'].forEach(t => {
    if (diaData[t] && diaData[t].sueldo) {
      total += parseFloat(diaData[t].sueldo) || 0;
    }
  });
  return total;
}

function getBonif(panel, fecha) {
  const agKey = PANEL_TO_AG[panel];
  if (!agKey || !TURNOS_CACHE[agKey]) return 0;
  const diaData = TURNOS_CACHE[agKey][fecha];
  if (!diaData) return 0;
  let total = 0;
  ['manana','tarde','noche'].forEach(t => {
    if (diaData[t] && diaData[t].bonos) {
      total += parseFloat(diaData[t].bonos) || 0;
    }
  });
  return total;
}

async function completarSueldosBonif(shId) {
  await cargarTurnosData();
  const semIdx = ['sh_s1','sh_s2','sh_s3','sh_s4'].indexOf(shId);
  const offset  = parseInt(g(shId+'_offset')) || 0;
  const lunes   = luneSemana(MES, semIdx + offset);

  for (let d = 0; d < 7; d++) {
    const dt = new Date(lunes);
    dt.setDate(lunes.getDate() + d);
    const pad = n => String(n).padStart(2,'0');
    const fecha = `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`;
    const dk = `${shId}_d${d}`;

    PANELES.forEach((panel, pi) => {
      const sue = getSueldo(panel, fecha);
      const bon = getBonif(panel, fecha);

      if (sue > 0) {
        s(`${dk}_p${pi}_sue`, Math.round(sue).toString());
        const el = document.getElementById(`${dk}_p${pi}_sue`);
        if (el) { el.value = Math.round(sue).toLocaleString('es-AR'); el.style.background='rgba(52,211,153,.08)'; }
      }
      if (bon > 0) {
        s(`${dk}_p${pi}_bon`, Math.round(bon).toString());
        const el = document.getElementById(`${dk}_p${pi}_bon`);
        if (el) { el.value = Math.round(bon).toLocaleString('es-AR'); el.style.background='rgba(56,189,248,.08)'; }
      }
    });
    // Recalcular día
    recalcDia(shId, d);
  }
  recalcSemRes(shId);
  autoSave();
}

let asTimer = null;
function autoSave() {
  clearTimeout(asTimer);
  asTimer = setTimeout(() => guardarFirebase(), 800);
}

async function guardarFrancos() {
  // Recopilar los datos actuales de los inputs de francos
  try {
    if (!window._fbReady || !window._db) return;
    // Leer valores actuales de los inputs fra_g*
    const grupos = JSON.parse(JSON.stringify(GRUPOS)); // copia de GRUPOS con valores editados
    grupos.forEach((grp, gi) => {
      grp.turnos.forEach((turno, ti) => {
        turno.d.forEach((_, di) => {
          const key = `fra_g${gi}_t${ti}_d${di}`;
          const el = document.getElementById(key);
          if (el && el.value) turno.d[di] = el.value;
        });
      });
    });
    await window._setDoc(
      window._doc(window._db, 'francos_data', 'tabla'),
      { grupos, reempl: REEMPL_DATA_GLOBAL, updated: new Date().toISOString() }
    );
  } catch(e) { console.warn('Error guardando francos:', e); }
}

async function guardarFirebase() {
  const m = document.getElementById('asMsg');
  if (m) { m.style.display='block'; m.textContent='Guardando...'; }
  try {
    // Siempre guardar en localStorage como respaldo
    localStorage.setItem('retiros26', JSON.stringify(DATA));
    // Guardar en Firebase si está disponible
    if (window._fbReady && window._db) {
      await window._setDoc(fbDoc(MES), { data: JSON.stringify(DATA[MES]||{}), mes: MES, updated: new Date().toISOString() });
      // También guardar francos si estamos en esa sección
      await guardarFrancos();
    }
    if (m) { m.textContent='✓ Guardado'; setTimeout(()=>m.style.display='none',1200); }
  } catch(e) {
    console.error('Error guardando:', e);
    if (m) { m.textContent='⚠ Error al guardar'; setTimeout(()=>m.style.display='none',2000); }
  }
}

function guardar() {
  guardarFirebase();
  const m = document.getElementById('savedInd');
  if (m) { m.style.display='inline'; setTimeout(()=>m.style.display='none',2000); }
}

async function cargarDesdeFirebase() {
  try {
    const snap = await window._getDoc(fbDoc(MES));
    if (snap.exists()) {
      const remote = JSON.parse(snap.data().data || '{}');
      if (!DATA[MES]) DATA[MES] = {};
      DATA[MES] = Object.assign({}, DATA[MES], remote);
    }
  } catch(e) {
    console.warn('Error cargando Firebase:', e);
  }
}

async function cargarStorage() {
  // 1. Cargar localStorage como base rápida
  try {
    const raw = localStorage.getItem('retiros26');
    if (raw) DATA = JSON.parse(raw);
  } catch(e) { DATA = {}; }

  // 2. Esperar hasta 3 segundos a que Firebase esté listo
  await new Promise(resolve => {
    if (window._fbReady && window._db) {
      resolve();
    } else {
      const timeout = setTimeout(resolve, 3000);
      window.addEventListener('fbReady', () => { clearTimeout(timeout); resolve(); }, { once: true });
    }
  });

  // 3. Cargar desde Firebase (sobreescribe localStorage)
  await cargarDesdeFirebase();
}

// ── EXPORTAR CSV ─────────────────────────────────────────────
function exportarCSV() {
  const rows = [[`Control de Retiros — ${MES}`],[]];
  ['sh_s1','sh_s2','sh_s3','sh_s4'].forEach((sem,si) => {
    rows.push([`Semana ${si+1}: ${g(sem+'_period')}`]);
    rows.push(['Día','Panel','Mañana','Tarde','Noche','Ret.Lez','Ret.Mar','P.Fichas','Banco','Gasto','US$','SubTotal']);
    for (let d=0; d<7; d++) {
      const dk=`${sem}_d${d}`;
      let tM=0,tT=0,tN=0;
      PANELES.forEach((p,pi)=>{
        tM+=nv(g(`${dk}_p${pi}_m`)); tT+=nv(g(`${dk}_p${pi}_t`)); tN+=nv(g(`${dk}_p${pi}_n`));
        const m=g(`${dk}_p${pi}_m`), t=g(`${dk}_p${pi}_t`), n=g(`${dk}_p${pi}_n`);
        if(m||t||n) rows.push(['',p,m||0,t||0,n||0,'','','','','','','']);
      });
      const banco=nv(g(`${dk}_banco`)), retL=nv(g(`${dk}_retL`)), retM=nv(g(`${dk}_retM`));
      const pagF=nv(g(`${dk}_pagF`)), gasto=nv(g(`${dk}_gasto`)), usd=nv(g(`${dk}_usd`));
      const sub=tM+tT+tN+banco-retL-retM-pagF-gasto-usd;
      rows.push([g(`${dk}_nom`)||DIAS_NOMBRE[d],'TOTAL',tM,tT,tN,retL,retM,pagF,banco,gasto,usd,sub]);
    }
    rows.push([]);
  });
  const csv = '\uFEFF' + rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = `Retiros_${MES.replace(' ','_')}.csv`;
  a.click();
}

// Modal observaciones
let _obsCurrentKey = null;

function obsClick(btn) {
  openObsModal(btn.dataset.key, btn.dataset.titulo);
}

function openObsModal(dataKey, titulo) {
  _obsCurrentKey = dataKey;
  const val = g(dataKey) || '';
  document.getElementById('obsTextarea').value = val;
  document.getElementById('obsModalTitle').textContent = '📝 ' + titulo;
  document.getElementById('obsOverlay').classList.add('open');
  setTimeout(() => document.getElementById('obsTextarea').focus(), 100);
}

function closeObsModal() {
  document.getElementById('obsOverlay').classList.remove('open');
  _obsCurrentKey = null;
}

function saveObs() {
  if (!_obsCurrentKey) return;
  const val = document.getElementById('obsTextarea').value;
  s(_obsCurrentKey, val);
  // Actualizar preview
  const prevEl = document.getElementById(_obsCurrentKey + '_prev');
  if (prevEl) prevEl.textContent = val ? '💬 ' + val.substring(0,30) + (val.length>30?'...':'') : '';
  autoSave();
  closeObsModal();
}

// Cerrar modal con Escape
document.addEventListener('keydown', e => { if(e.key==='Escape') closeObsModal(); });


// Colorear select de tipo de sueldo

}

// Colorear celda de franco si es reemplazante
const REEMPLAZANTES_SET = new Set(['Lud','Sofi','Flor','Valen','Guada','Gua']);
function colorFranco(inp) {
  const es = REEMPLAZANTES_SET.has(inp.value.trim());
  inp.parentElement.style.background = es ? '#C00000' : '#fff';
  inp.style.color = es ? '#fff' : '#000';
}

function renderProductividad() {
  const el = document.getElementById('sh_prod');
  if (!el) return;

  const semanas = ['Semana 1','Semana 2','Semana 3','Semana 4'];
  const montoKey = 'prod_monto_max';
  const montoVal = g(montoKey) || '35000';
  const si = g('prod_sem_sel') || '0';
  const monto = parseFloat((montoVal+'').replace(/\./g,'').replace(',','.')) || 35000;

  let h = `<style>${PROD_CSS}</style><div class="kb kb-bg">`;

  // Header
  h += `<div class="kb-hdr">
    <div>
      <div class="kb-title">Productividad</div>
      <div class="kb-sub">${MES} · ${semanas[parseInt(si)]}</div>
    </div>
    <div class="kb-ctrl">
      <label>Semana</label>
      <select id="prod_sem_sel" onchange="onInp(this);renderProductividad()">`;
  semanas.forEach((sem,i) => h += `<option value="${i}" ${si==i?'selected':''}>${sem}</option>`);
  h += `</select>
      <label>Premio $</label>
      <input id="${montoKey}" value="${montoVal}" oninput="onInp(this)" onchange="onInp(this);renderProductividad()" placeholder="35000">
    </div>
  </div>`;

  // Cards en bloques de 2 paneles por fila
  h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">`;

  PANELES.forEach((panel, pi) => {
    const col = PANEL_COL[panel] || {bg:'#f5f5f5',tc:'#444'};

    h += `<div style="background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 3px rgba(9,30,66,.1)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid ${col.bg}">
        <span style="font-size:12px;font-weight:700;padding:3px 10px;border-radius:4px;background:${col.bg};color:${col.tc}">${panel}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">`;

    PERSONAL[pi].forEach((per, ri) => {
      const base = `prod_${si}_p${pi}_r${ri}`;
      const tieneP = g(`${base}_premio_otorgado`) === '1';

      h += `<div class="kb-card" style="box-shadow:none;border:1px solid #f0f0f0;padding:10px">
        <div>
          <div class="kb-name">${per.n}</div>
          <div class="kb-turno">Turno ${per.t}</div>
        </div>
        <div class="kb-crits" style="margin-top:8px">`;

      CRITERIOS.forEach(c => {
        const key = `${base}_${c.key}`;
        const tieneNota = !!g(key);
        h += `<div class="kb-crit-row">
          <span class="kb-crit-name">${c.label}</span>
          <button class="kb-crit-btn ${tieneNota?'kb-crit-done':'kb-crit-blank'}"
            data-key="${key}" data-titulo="${c.label} — ${per.n} (${panel})"
            onclick="obsClick(this)">
            ${tieneNota ? '✓' : '+'}
          </button>
        </div>`;
      });

      h += `</div>
        <div class="kb-footer" style="margin-top:8px">
          <span class="${tieneP?'kb-premio-on':'kb-premio-off'}">
            ${tieneP ? '$'+Math.round(monto).toLocaleString('es-AR') : 'Sin premio'}
          </span>
          <input type="checkbox" class="kb-check" id="${base}_premio_otorgado"
            ${tieneP?'checked':''}
            onchange="s(this.id,this.checked?'1':'0');autoSave();renderProductividad()">
        </div>
      </div>`;
    });

    h += `</div></div>`;
  });

  h += `</div>`;

  // Ranking
  const ganadores = [];
  PANELES.forEach((panel,pi) => {
    PERSONAL[pi].forEach((per,ri) => {
      if (g(`prod_${si}_p${pi}_r${ri}_premio_otorgado`) === '1')
        ganadores.push({nom:per.n, panel, t:per.t});
    });
  });

  h += `<div class="kb-sep"></div>
  <div class="kb-rank-title">Agentes con premio · ${semanas[parseInt(si)]}</div>`;

  if (ganadores.length === 0) {
    h += `<div class="kb-empty">Ningún agente seleccionado aún</div>`;
  } else {
    const medals = ['🥇','🥈','🥉'];
    h += `<div class="kb-rank-grid">`;
    ganadores.forEach((gn,i) => {
      h += `<div class="kb-rank-card">
        <div class="kb-medal">${medals[i]||'🏅'}</div>
        <div>
          <div class="kb-rname">${gn.nom}</div>
          <div class="kb-rsub">${gn.panel} · ${gn.t}</div>
        </div>
        <div class="kb-ramt">$${Math.round(monto).toLocaleString('es-AR')}</div>
      </div>`;
    });
    h += `</div>`;
  }

  h += `</div>`;
  el.innerHTML = h;
}
