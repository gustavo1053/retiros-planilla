<script>
// ── CONSTANTES ──────────────────────────────────────────────
const PANELES = ['Age 18','Age 19','Age 21','Age 22','Age 23','Age 24','Age 25','Sm'];
const PC = ['p18','p19','p21','p22','p23','p24','p25','psm'];
const DIAS_NOMBRE = ['LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO','DOMINGO'];
const DIAS_CORTO  = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const PERSONAL = [
  [{n:'Andrea',t:'M'},{n:'Meli',t:'T'},{n:'Tammi',t:'N'}],
  [{n:'Lourdes',t:'M'},{n:'Ingrid',t:'T'},{n:'Nico',t:'N'}],
  [{n:'Nao',t:'M'},{n:'Jhona',t:'T'},{n:'Majo',t:'N'}],
  [{n:'Mili',t:'M'},{n:'Vero',t:'T'},{n:'Jenni',t:'N'}],
  [{n:'Agus M',t:'M'},{n:'Maria',t:'T'},{n:'Anto',t:'N'}],
  [{n:'Agus',t:'M'},{n:'Romi',t:'T'},{n:'Jhoa',t:'N'}],
  [{n:'Cami',t:'M'},{n:'Thiago',t:'T'},{n:'May',t:'N'}],
  [{n:'Rafa',t:'M'},{n:'Brisa',t:'T'},{n:'Mile',t:'N'}],
];

// ── ESTADO ──────────────────────────────────────────────────
let MES = 'Mayo 2026';
let DATA = {};

function g(k)   { return (DATA[MES] && DATA[MES][k] != null) ? DATA[MES][k] : ''; }
function s(k,v) { if (!DATA[MES]) DATA[MES]={}; DATA[MES][k]=v; }
function nv(v)  { return parseFloat((String(v)).replace(/\./g,'').replace(',','.')) || 0; }
function fmt(v) { return v ? Math.round(v).toLocaleString('es-AR') : ''; }

// ── NAV ─────────────────────────────────────────────────────
function showSheet(id, el) {
  document.querySelectorAll('.sheet').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.stab').forEach(x => x.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

async function cambiarMes() {
  MES = document.getElementById('mesSelect').value;
  await cargarDesdeFirebase();
  renderAll();
}

// ── INPUT HELPER ─────────────────────────────────────────────
function inp(id, extra='', ph='') {
  const val = g(id);
  return `<input class="c ${extra}" id="${id}" value="${val}" placeholder="${ph}"
    oninput="onInp(this)" onchange="onInp(this)">`;
}

function onInp(el) {
  s(el.id, el.value);
  const id = el.id;

  // Semana día: sh_s1_d2_p3_m  → recalc ese día
  const mDia = id.match(/^(sh_s\d)_d(\d+)_(p\d+_[mtn]|retL|retM|pagF|banco|gasto|usd)$/);
  if (mDia) { recalcDia(mDia[1], parseInt(mDia[2])); recalcSemRes(mDia[1]); }

  // Sueldo: sh_su1_... → recalc ese sueldo
  const mSu = id.match(/^(sh_su\d)_/);
  if (mSu) recalcSueldo(mSu[1]);

  // Carga: sh_carga_p2_c0_d3 → recalc esa carga
  const mCg = id.match(/^(sh_carga)_p(\d+)_c(\d+)_d(\d+)$/);
  if (mCg) recalcCarga(parseInt(mCg[3]));

  autoSave();
}

// ── SETCALC ──────────────────────────────────────────────────
function sc(id, val) {
  const el = document.getElementById(id);
  if (el) { el.textContent = fmt(val); el._val = val || 0; }
}

// ── RECALC DÍA ───────────────────────────────────────────────
function recalcDia(sem, d) {
  let totM=0, totT=0, totN=0;
  PANELES.forEach((p,pi) => {
    totM += nv(g(`${sem}_d${d}_p${pi}_m`));
    totT += nv(g(`${sem}_d${d}_p${pi}_t`));
    totN += nv(g(`${sem}_d${d}_p${pi}_n`));
  });
  const banco = nv(g(`${sem}_d${d}_banco`));
  const retL  = nv(g(`${sem}_d${d}_retL`));
  const retM  = nv(g(`${sem}_d${d}_retM`));
  const pagF  = nv(g(`${sem}_d${d}_pagF`));
  const gasto = nv(g(`${sem}_d${d}_gasto`));
  const usd   = nv(g(`${sem}_d${d}_usd`));
  const total = totM + totT + totN + banco;
  const sub   = total - retL - retM - pagF - gasto - usd;
  sc(`${sem}_d${d}_totM`, totM);
  sc(`${sem}_d${d}_totT`, totT);
  sc(`${sem}_d${d}_totN`, totN);
  sc(`${sem}_d${d}_total`, total);
  sc(`${sem}_d${d}_sub`,   sub);
}

function recalcSemRes(sem) {
  PANELES.forEach((p,pi) => {
    let tot=0;
    for (let d=0; d<7; d++) {
      tot += nv(g(`${sem}_d${d}_p${pi}_m`));
      tot += nv(g(`${sem}_d${d}_p${pi}_t`));
      tot += nv(g(`${sem}_d${d}_p${pi}_n`));
    }
    sc(`${sem}_res_p${pi}`, tot);
  });
  let tL=0, tM=0;
  for (let d=0; d<7; d++) {
    tL += nv(g(`${sem}_d${d}_retL`));
    tM += nv(g(`${sem}_d${d}_retM`));
  }
  sc(`${sem}_totRetL`, tL);
  sc(`${sem}_totRetM`, tM);
}

// ── RECALC SUELDO ────────────────────────────────────────────
function recalcSueldo(su) {
  for (let d=0; d<7; d++) {
    let col=0;
    PANELES.forEach((p,pi) => {
      PERSONAL[pi].forEach((per,peri) => {
        col += nv(g(`${su}_p${pi}_r${peri}_d${d}`));
      });
    });
    sc(`${su}_col${d}`, col);
  }
  let grand=0;
  for (let d=0; d<7; d++) {
    const el = document.getElementById(`${su}_col${d}`);
    grand += el ? (el._val||0) : 0;
  }
  sc(`${su}_subtot`, grand);
  // totales por persona
  PANELES.forEach((p,pi) => {
    PERSONAL[pi].forEach((per,peri) => {
      let tot=0;
      for (let d=0; d<7; d++) tot += nv(g(`${su}_p${pi}_r${peri}_d${d}`));
      tot += nv(g(`${su}_p${pi}_r${peri}_prop`));
      sc(`${su}_p${pi}_r${peri}_tot`, tot);
    });
  });
}

// ── RECALC CARGA ─────────────────────────────────────────────
function recalcCarga(ci) {
  PANELES.forEach((p,pi) => {
    let row=0;
    for (let d=0; d<7; d++) row += nv(g(`sh_carga_p${pi}_c${ci}_d${d}`));
    sc(`cg_p${pi}_c${ci}_tot`, row*0.7);
  });
  for (let d=0; d<7; d++) {
    let col=0;
    PANELES.forEach((p,pi) => col += nv(g(`sh_carga_p${pi}_c${ci}_d${d}`)));
    sc(`cg_c${ci}_d${d}_tot`, col);
  }
  let grand=0;
  PANELES.forEach((p,pi) => {
    let row=0;
    for (let d=0; d<7; d++) row += nv(g(`sh_carga_p${pi}_c${ci}_d${d}`));
    grand += row;
  });
  sc(`cg_c${ci}_grand`, grand*0.7);
}

// ── HELPERS FECHA ────────────────────────────────────────────
// Devuelve el lunes de la semana N del mes (0-indexed)
function luneSemana(mesStr, semIdx) {
  const [mesNom, anio] = mesStr.split(' ');
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                 'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const m = meses.indexOf(mesNom);
  const y = parseInt(anio);
  // Encontrar el primer lunes del mes
  let d = new Date(y, m, 1);
  while (d.getDay() !== 1) d.setDate(d.getDate()+1);
  // Avanzar semIdx semanas
  d.setDate(d.getDate() + semIdx*7);
  return d;
}

function periodoLabel(lunes) {
  const dom = new Date(lunes); dom.setDate(lunes.getDate()+6);
  const pad = n => String(n).padStart(2,'0');
  return `${pad(lunes.getDate())}/${pad(lunes.getMonth()+1)} al ${pad(dom.getDate())}/${pad(dom.getMonth()+1)}/${dom.getFullYear()}`;
}

function fechaDia(lunes, d) {
  const dt = new Date(lunes); dt.setDate(lunes.getDate()+d);
  const pad = n => String(n).padStart(2,'0');
  return `${pad(dt.getDate())}/${pad(dt.getMonth()+1)}`;
}

// semIdx: 0-3 para s1-s4
const SEM_IDX = {'sh_s1':0,'sh_s2':1,'sh_s3':2,'sh_s4':3};

function getSemOffset(shId) {
  const key = shId+'_offset';
  return parseInt(g(key)) || 0;
}

function moveSem(shId, delta) {
  const key = shId+'_offset';
  const cur = getSemOffset(shId);
  s(key, cur+delta);
  renderSemana(shId, ''); // re-render
  // Actualizar titulo
  const idx = SEM_IDX[shId] !== undefined ? SEM_IDX[shId] : 0;
  const lunes = getLunesSem(shId);
  const el = document.getElementById(shId+'_periodo_lbl');
  if(el) el.textContent = periodoLabel(lunes);
}

function getLunesSem(shId) {
  const base = SEM_IDX[shId] !== undefined ? SEM_IDX[shId] : 0;
  const offset = getSemOffset(shId);
  const lunes = luneSemana(MES, base + offset);
  return lunes;
}

function moveDay(shId, dIdx, delta) {
  const key = `${shId}_d${dIdx}_offset`;
  const cur = parseInt(g(key)) || 0;
  s(key, cur+delta);
  // Actualizar label del día
  const lunes = getLunesSem(shId);
  const dt = new Date(lunes); dt.setDate(lunes.getDate()+dIdx + (cur+delta));
  const pad = n => String(n).padStart(2,'0');
  const fechaStr = `${pad(dt.getDate())}/${pad(dt.getMonth()+1)}`;
  const lblEl = document.getElementById(`${shId}_d${dIdx}_flbl`);
  if(lblEl) lblEl.textContent = fechaStr;
  autoSave();
}

// ── RENDER SEMANA ────────────────────────────────────────────
function renderSemana(shId, titulo) {
  const el = document.getElementById(shId);
  if (!el) return;

  const semIdx = SEM_IDX[shId] !== undefined ? SEM_IDX[shId] : 0;
  const lunes = getLunesSem(shId);
  const periodo = periodoLabel(lunes);

  // Titulo real
  const tit = titulo || `${MES} — Semana ${semIdx+1}`;

  let h = `<div class="shdr" style="display:flex;align-items:center;gap:10px">
    <span>${tit}</span>
    <div class="period-ctrl">
      <button class="arr-btn" onclick="moveSem('${shId}',-1)" title="Semana anterior">&#8592;</button>
      <span class="period-lbl" id="${shId}_periodo_lbl">${periodo}</span>
      <button class="arr-btn" onclick="moveSem('${shId}',1)" title="Semana siguiente">&#8594;</button>
    </div>
  </div>`;

  for (let d=0; d<7; d++) {
    const dk = `${shId}_d${d}`;
    const dayOffset = parseInt(g(`${dk}_offset`)) || 0;
    const dt = new Date(lunes); dt.setDate(lunes.getDate()+d+dayOffset);
    const pad = n => String(n).padStart(2,'0');
    const fechaStr = `${pad(dt.getDate())}/${pad(dt.getMonth()+1)}`;
    const diaNom = DIAS_NOMBRE[d];

    h += `<div class="blk">
    <div class="blkhdr">
      <span style="font-weight:700;min-width:90px">${diaNom}</span>
      <div class="day-ctrl">
        <button class="day-arr" onclick="moveDay('${shId}',${d},-1)" title="Día anterior">&#8592;</button>
        <span class="day-lbl" id="${dk}_flbl">${fechaStr}</span>
        <button class="day-arr" onclick="moveDay('${shId}',${d},1)" title="Día siguiente">&#8594;</button>
      </div>
    </div>
    <table>
      <thead><tr>
        <th style="width:65px">Fecha</th>
        <th style="width:100px">Panel</th>
        <th style="width:120px">Mañana</th>

// ── FIREBASE ─────────────────────────────────────────────────
function fbDoc(mes) {
  return window._doc(window._db, 'retiros_data', mes.replace(/ /g,'_'));
}

// ── GUARDAR / AUTOSAVE ───────────────────────────────────────
let asTimer = null;
function autoSave() {
  clearTimeout(asTimer);
  asTimer = setTimeout(() => guardarFirebase(), 800);
}

async function guardarFirebase() {
  const m = document.getElementById('asMsg');
  if (m) { m.style.display='block'; m.textContent='Guardando...'; }
  try {
    // Siempre guardar en localStorage como respaldo
    localStorage.setItem('retiros26', JSON.stringify(DATA));
    // Guardar en Firebase si está disponible
    if (window._fbReady && window._db) {
      await window._setDoc(fbDoc(MES), { data: JSON.stringify(DATA[MES]||{}), mes: MES, updated: new Date().toISOString() });
    }
    if (m) { m.textContent='✓ Guardado'; setTimeout(()=>m.style.display='none',1200); }
  } catch(e) {
    console.error('Error guardando:', e);
    if (m) { m.textContent='⚠ Error al guardar'; setTimeout(()=>m.style.display='none',2000); }
  }
}

function guardar() {
  guardarFirebase();
  const m = document.getElementById('savedInd');
  if (m) { m.style.display='inline'; setTimeout(()=>m.style.display='none',2000); }
}

async function cargarDesdeFirebase() {
  try {
    const snap = await window._getDoc(fbDoc(MES));
    if (snap.exists()) {
      const remote = JSON.parse(snap.data().data || '{}');
      if (!DATA[MES]) DATA[MES] = {};
      DATA[MES] = Object.assign({}, DATA[MES], remote);
    }
  } catch(e) {
    console.warn('Error cargando Firebase:', e);
  }
}

async function cargarStorage() {
  // 1. Cargar localStorage como base rápida
  try {
    const raw = localStorage.getItem('retiros26');
    if (raw) DATA = JSON.parse(raw);
  } catch(e) { DATA = {}; }

  // 2. Esperar hasta 3 segundos a que Firebase esté listo
  await new Promise(resolve => {
    if (window._fbReady && window._db) {
      resolve();
    } else {
      const timeout = setTimeout(resolve, 3000);
      window.addEventListener('fbReady', () => { clearTimeout(timeout); resolve(); }, { once: true });
    }
  });

  // 3. Cargar desde Firebase (sobreescribe localStorage)
  await cargarDesdeFirebase();
}

// ── EXPORTAR CSV ─────────────────────────────────────────────
function exportarCSV() {
  const rows = [[`Control de Retiros — ${MES}`],[]];
  ['sh_s1','sh_s2','sh_s3','sh_s4'].forEach((sem,si) => {
    rows.push([`Semana ${si+1}: ${g(sem+'_period')}`]);
    rows.push(['Día','Panel','Mañana','Tarde','Noche','Ret.Lez','Ret.Mar','P.Fichas','Banco','Gasto','US$','SubTotal']);
    for (let d=0; d<7; d++) {
      const dk=`${sem}_d${d}`;
      let tM=0,tT=0,tN=0;
      PANELES.forEach((p,pi)=>{
        tM+=nv(g(`${dk}_p${pi}_m`)); tT+=nv(g(`${dk}_p${pi}_t`)); tN+=nv(g(`${dk}_p${pi}_n`));
        const m=g(`${dk}_p${pi}_m`), t=g(`${dk}_p${pi}_t`), n=g(`${dk}_p${pi}_n`);
        if(m||t||n) rows.push(['',p,m||0,t||0,n||0,'','','','','','','']);
      });
      const banco=nv(g(`${dk}_banco`)), retL=nv(g(`${dk}_retL`)), retM=nv(g(`${dk}_retM`));
      const pagF=nv(g(`${dk}_pagF`)), gasto=nv(g(`${dk}_gasto`)), usd=nv(g(`${dk}_usd`));
      const sub=tM+tT+tN+banco-retL-retM-pagF-gasto-usd;
      rows.push([g(`${dk}_nom`)||DIAS_NOMBRE[d],'TOTAL',tM,tT,tN,retL,retM,pagF,banco,gasto,usd,sub]);
    }
    rows.push([]);
  });
  const csv = '\uFEFF' + rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = `Retiros_${MES.replace(' ','_')}.csv`;
  a.click();
}

    <span style="background:#C00000;color:#fff;padding:1px 6px;border-radius:2px">Rojo</span> = Reemplazante
  </div>`;

  GRUPOS.forEach((grp, gi) => {
    h += `<table style="margin-bottom:10px">
      <thead>
        <tr>
          <th colspan="8" style="background:${grp.bg};color:${grp.tc};text-align:left;padding:4px 8px;font-size:12px">${grp.panel}</th>
        </tr>
        <tr>
          <th style="width:70px"></th>`;
    DIAS.forEach(d => h += `<th style="min-width:70px">${d}</th>`);
    h += `</tr></thead><tbody>`;

    grp.turnos.forEach((turno, ti) => {
      h += `<tr>
        <td style="font-weight:700;background:${grp.bg};color:${grp.tc};text-align:center">${turno.t}</td>`;
      turno.d.forEach((persona, di) => {
        const key = `fra_g${gi}_t${ti}_d${di}`;
        const val = g(key) || persona;
        const esReemplazo = REEMPLAZANTES.has(val);
        const bg = esReemplazo ? '#C00000' : '#fff';
        const tc = esReemplazo ? '#fff' : '#000';
        h += `<td style="text-align:center;background:${bg}">
          <input class="c" id="${key}" value="${val}"
            oninput="onInp(this);colorFranco(this)"
            style="text-align:center;color:${tc};background:transparent;min-width:55px">
        </td>`;
      });
      h += `</tr>`;
    });
    h += `</tbody></table>`;
  });

  el.innerHTML = h;
}

// Modal observaciones
let _obsCurrentKey = null;

function obsClick(btn) {
  openObsModal(btn.dataset.key, btn.dataset.titulo);
}

function openObsModal(dataKey, titulo) {
  _obsCurrentKey = dataKey;
  const val = g(dataKey) || '';
  document.getElementById('obsTextarea').value = val;
  document.getElementById('obsModalTitle').textContent = '📝 ' + titulo;
  document.getElementById('obsOverlay').classList.add('open');
  setTimeout(() => document.getElementById('obsTextarea').focus(), 100);
}

function closeObsModal() {
  document.getElementById('obsOverlay').classList.remove('open');
  _obsCurrentKey = null;
}

function saveObs() {
  if (!_obsCurrentKey) return;
  const val = document.getElementById('obsTextarea').value;
  s(_obsCurrentKey, val);
  // Actualizar preview
  const prevEl = document.getElementById(_obsCurrentKey + '_prev');
  if (prevEl) prevEl.textContent = val ? '💬 ' + val.substring(0,30) + (val.length>30?'...':'') : '';
  autoSave();
  closeObsModal();
}

// Cerrar modal con Escape
document.addEventListener('keydown', e => { if(e.key==='Escape') closeObsModal(); });
// Cerrar modal clicking overlay
document.getElementById('obsOverlay').addEventListener('click', function(e) {
  if(e.target === this) closeObsModal();
});

// Colorear select de tipo de sueldo
function colorTipo(sel) {
  sel.className = 'sel-tipo tipo-' + sel.value;
}

// Colorear todos los selects al renderizar
function colorTiposAll() {
  document.querySelectorAll('.sel-tipo').forEach(s => colorTipo(s));
}

// Colorear celda de franco si es reemplazante
const REEMPLAZANTES_SET = new Set(['Lud','Sofi','Flor','Gua','Joha']);
function colorFranco(inp) {
  const es = REEMPLAZANTES_SET.has(inp.value.trim());
  inp.parentElement.style.background = es ? '#C00000' : '#fff';
  inp.style.color = es ? '#fff' : '#000';
}

// ── RENDER ALL ───────────────────────────────────────────────
function renderAll() {
  const mes = document.getElementById('mesSelect').value;
  MES = mes;
  renderSemana('sh_s1', `${mes} — Semana 1`);
  renderSemana('sh_s2', `${mes} — Semana 2`);
  renderSemana('sh_s3', `${mes} — Semana 3`);
  renderSemana('sh_s4', `${mes} — Semana 4`);
  renderCargas();
  renderSueldo('sh_su1', `Sueldos Semana 1 — ${mes}`);
  renderSueldo('sh_su2', `Sueldos Semana 2 — ${mes}`);
  renderSueldo('sh_su3', `Sueldos Semana 3 — ${mes}`);
  renderSueldo('sh_su4', `Sueldos Semana 4 — ${mes}`);
  renderDirecciones();
  renderFrancos();
}

// ── INIT ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function() {
  await cargarStorage();
  renderAll();
});
</script>
<!-- Modal observaciones -->
<div class="obs-overlay" id="obsOverlay">
  <div class="obs-modal">
    <div class="obs-modal-hdr">
      <span id="obsModalTitle">📝 Observación</span>
      <button class="obs-modal-close" onclick="closeObsModal()">✕</button>
    </div>
    <div class="obs-modal-body">
      <textarea class="obs-textarea" id="obsTextarea" placeholder="Escribí la observación acá..."></textarea>
    </div>
    <div class="obs-modal-footer">
      <button class="obs-cancel" onclick="closeObsModal()">Cancelar</button>
      <button class="obs-ok" onclick="saveObs()">✓ Guardar</button>
    </div>
  </div>
</div>
